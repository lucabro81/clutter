name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: clutter-macos-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: clutter-linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          tar czf ${{ matrix.artifact }}.tar.gz \
            -C target/${{ matrix.target }}/release clutter

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate setup.sh
        run: |
          sed "s|{{VERSION}}|${{ github.ref_name }}|g" \
            scripts/setup.sh.template > setup.sh
          chmod +x setup.sh

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            clutter-macos-arm64.tar.gz
            clutter-linux-x86_64.tar.gz
            setup.sh
